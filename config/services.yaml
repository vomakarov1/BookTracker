parameters:
  storage_path: '%project_dir%/storage'

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  _instanceof:
    Symfony\Component\Console\Command\Command:
      public: true

  BookTracker\Application\Command\Book\CreateBookHandler: ~
  BookTracker\Application\Command\Book\DeleteBookHandler: ~
  BookTracker\Application\Command\User\CreateUserHandler: ~
  BookTracker\Application\Command\User\DeleteUserHandler: ~
  BookTracker\Application\Command\ReadingEntry\CreateReadingEntryHandler: ~
  BookTracker\Application\Command\ReadingEntry\DeleteReadingEntryHandler: ~
  BookTracker\Application\Command\ReadingEntry\ChangeReadingStatusHandler: ~
  BookTracker\Application\Command\ReadingEntry\RateReadingEntryHandler: ~

  BookTracker\Application\Query\Book\GetBookHandler: ~
  BookTracker\Application\Query\Book\GetBooksListHandler: ~
  BookTracker\Application\Query\User\GetUserHandler: ~
  BookTracker\Application\Query\User\GetUsersListHandler: ~
  BookTracker\Application\Query\ReadingEntry\GetReadingEntriesHandler: ~
  BookTracker\Application\Query\Recommendation\GetRecommendationsHandler: ~

  BookTracker\Application\Command\Import\ImportBooksHandler:
    arguments:
      $parsers:
        json: '@BookTracker\Infrastructure\Import\JsonParser'
        csv: '@BookTracker\Infrastructure\Import\CsvParser'

  BookTracker\Application\Command\Export\ExportBooksHandler:
    arguments:
      $formatters:
        json: '@BookTracker\Infrastructure\Export\JsonFormatter'
        csv: '@BookTracker\Infrastructure\Export\CsvFormatter'

  BookTracker\Domain\Service\RecommendationService: ~

  BookTracker\Infrastructure\Repository\JsonBookRepository:
    arguments:
      $storage: '@book.json_storage'

  BookTracker\Infrastructure\Repository\JsonUserRepository:
    arguments:
      $storage: '@user.json_storage'

  BookTracker\Infrastructure\Repository\JsonReadingEntryRepository:
    arguments:
      $storage: '@reading_entry.json_storage'

  book.json_storage:
    class: BookTracker\Infrastructure\Storage\JsonFileStorage
    arguments: [ '%storage_path%/books.json', '@Symfony\Component\Filesystem\Filesystem', '@Symfony\Component\Lock\LockFactory' ]

  user.json_storage:
    class: BookTracker\Infrastructure\Storage\JsonFileStorage
    arguments: [ '%storage_path%/users.json', '@Symfony\Component\Filesystem\Filesystem', '@Symfony\Component\Lock\LockFactory' ]

  reading_entry.json_storage:
    class: BookTracker\Infrastructure\Storage\JsonFileStorage
    arguments: [ '%storage_path%/reading_entries.json', '@Symfony\Component\Filesystem\Filesystem', '@Symfony\Component\Lock\LockFactory' ]

  Symfony\Component\Filesystem\Filesystem: ~

  Symfony\Component\Lock\Store\FlockStore:
    arguments:
      $lockPath: '%project_dir%/storage'

  Symfony\Component\Lock\LockFactory:
    arguments:
      $store: '@Symfony\Component\Lock\Store\FlockStore'

  Symfony\Component\Serializer\SerializerInterface:
    factory: [ 'BookTracker\Infrastructure\Serializer\AppSerializerFactory', 'create' ]

  BookTracker\Infrastructure\UuidV4Generator: ~
  BookTracker\Infrastructure\LocalFileReader: ~
  BookTracker\Infrastructure\LocalFileWriter: ~

  BookTracker\Application\Port\IdGeneratorInterface:
    alias: BookTracker\Infrastructure\UuidV4Generator

  BookTracker\Application\Port\FileReaderInterface:
    alias: BookTracker\Infrastructure\LocalFileReader

  BookTracker\Application\Port\FileWriterInterface:
    alias: BookTracker\Infrastructure\LocalFileWriter

  BookTracker\Infrastructure\Import\JsonParser: ~
  BookTracker\Infrastructure\Import\CsvParser: ~
  BookTracker\Infrastructure\Export\JsonFormatter: ~
  BookTracker\Infrastructure\Export\CsvFormatter: ~
  BookTracker\Infrastructure\Vectorization\BookFeatureVectorizer: ~
  BookTracker\Infrastructure\Vectorization\CosineDistance: ~

  BookTracker\Domain\Repository\BookRepositoryInterface:
    alias: BookTracker\Infrastructure\Repository\JsonBookRepository

  BookTracker\Domain\Repository\UserRepositoryInterface:
    alias: BookTracker\Infrastructure\Repository\JsonUserRepository

  BookTracker\Domain\Repository\ReadingEntryRepositoryInterface:
    alias: BookTracker\Infrastructure\Repository\JsonReadingEntryRepository

  BookTracker\Domain\Service\VectorizerInterface:
    alias: BookTracker\Infrastructure\Vectorization\BookFeatureVectorizer

  BookTracker\Domain\Service\DistanceMetricInterface:
    alias: BookTracker\Infrastructure\Vectorization\CosineDistance

  BookTracker\Adapters\Cli\CreateBookCliCommand: ~
  BookTracker\Adapters\Cli\DeleteBookCliCommand: ~
  BookTracker\Adapters\Cli\ListBooksCliCommand: ~
  BookTracker\Adapters\Cli\ShowBookCliCommand: ~
  BookTracker\Adapters\Cli\CreateUserCliCommand: ~
  BookTracker\Adapters\Cli\DeleteUserCliCommand: ~
  BookTracker\Adapters\Cli\ListUsersCliCommand: ~
  BookTracker\Adapters\Cli\ShowUserCliCommand: ~
  BookTracker\Adapters\Cli\CreateReadingEntryCliCommand: ~
  BookTracker\Adapters\Cli\ChangeReadingStatusCliCommand: ~
  BookTracker\Adapters\Cli\RateReadingEntryCliCommand: ~
  BookTracker\Adapters\Cli\ListReadingEntriesCliCommand: ~
  BookTracker\Adapters\Cli\DeleteReadingEntryCliCommand: ~
  BookTracker\Adapters\Cli\GetRecommendationsCliCommand: ~
  BookTracker\Adapters\Cli\ImportBooksCliCommand: ~
  BookTracker\Adapters\Cli\ExportBooksCliCommand: ~
